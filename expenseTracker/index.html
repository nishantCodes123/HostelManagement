<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles/style.css">
    <script type="module" src="./dist/app.js" defer></script>
</head>

<body>

    <h1 class="title">Expense Tracker</h1>

    <!-- Balance Section -->
    <div class="balance-container">
        <div class="balance-card">
            <p>Current Balance</p>
            <h2 id="totalBalance">₹0</h2>
        </div>

        <div class="balance-card">
            <p>Monthly Balance</p>
            <h2 id="monthlyBalance">₹0</h2>
        </div>

        
    </div>

    <!-- Add Transaction -->
    <div class="form-card">
        <h3>Add Transaction</h3>

        <form id="transactionForm" class="form-row">
            <input type="text" id="description" placeholder="Description" required>

            <div class="amount-wrapper">
                <span>₹</span>
                <input type="number" id="amount" placeholder="Amount" required>
            </div>

            <select id="category" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Miscellaneous">Miscellaneous</option>
            </select>

            <input type="date" id="date" required>

            <button type="submit" class="primary-btn">Add Transaction</button>
        </form>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button id="monthlyTab" class="tab active">Monthly Overview</button>
        <button id="categoryTab" class="tab">Category Overview</button>
    </div>

    <!-- Table -->
    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
        </table>
    </div>

</body>
</html>
